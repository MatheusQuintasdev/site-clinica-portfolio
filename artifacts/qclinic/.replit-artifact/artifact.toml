kind = "web"
previewPath = "/"
title = "Q!Clinic – Landing Page"
version = "1.0.0"
id = "artifacts/qclinic"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25296

[services.development]
run = "pnpm --filter @workspace/qclinic run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/qclinic", "run", "build" ]
publicDir = "artifacts/qclinic/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25296"
BASE_PATH = "/"
